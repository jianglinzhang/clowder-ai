worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $host [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr request_time=$request_time upstream_time=$upstream_response_time';

    access_log /dev/stdout main;
    error_log  /dev/stderr info;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 7860 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 3600s;

        location = /healthz {
            proxy_pass http://127.0.0.1:7861/healthz;
        }

        location = /admin {
            proxy_pass http://127.0.0.1:7861/admin;
        }

        location /admin/ {
            proxy_pass http://127.0.0.1:7861;
        }

        location = /admin-api {
            proxy_pass http://127.0.0.1:7861/admin-api;
        }

        location /admin-api/ {
            proxy_pass http://127.0.0.1:7861;
            proxy_buffering off;
            add_header X-Accel-Buffering no;
        }

        location = /api {
            proxy_pass http://127.0.0.1:3004/api;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3004;
            proxy_buffering off;
            add_header X-Accel-Buffering no;
        }

        location = /socket.io {
            proxy_pass http://127.0.0.1:3004/socket.io;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /socket.io/ {
            proxy_pass http://127.0.0.1:3004;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://127.0.0.1:3003;
            proxy_buffering off;
            proxy_request_buffering off;
            add_header X-Accel-Buffering no;
        }
    }
}
